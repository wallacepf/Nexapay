pipeline:
  name: Nexapay Banking API - Build and Deploy
  identifier: nexapay_banking_api_build_deploy
  # orgIdentifier / projectIdentifier are structural in Harness (not runtime
  # inputs). Change these to match the org and project you import into.
  orgIdentifier: default
  projectIdentifier: nexapay
  properties:
    ci:
      codebase:
        # Account/org-level code connector pointing at this repo.
        connectorRef: <+input>
        repoName: Nexapay
        # Branch or PR to build; supplied when the pipeline runs.
        build: <+input>
  variables:
    - name: gcpProject
      type: String
      description: GCP project ID that hosts the GAR repo and the Cloud Run service.
      required: true
      value: <+input>
    - name: garHost
      type: String
      description: Regional Artifact Registry host, e.g. us-central1-docker.pkg.dev.
      required: true
      value: us-central1-docker.pkg.dev
    - name: garRepo
      type: String
      description: Artifact Registry repository name (the repo inside the project).
      required: true
      value: nexapay
    - name: imageName
      type: String
      description: Image name within the GAR repo.
      required: true
      value: banking-api
    # Cloud Run region and service name now live in the infrastructure and
    # service-manifest entities (infrastructure_cloud_run_dev.yaml and
    # manifests/cloud-run-service.yaml), not here.
    - name: dockerfile
      type: String
      # The root Dockerfile is intentionally broken (a workshop exercise), so the
      # working build at backup/Dockerfile is the default. Point this at
      # "Dockerfile" if you want the build stage to fail on purpose.
      description: Path to the Dockerfile to build.
      required: true
      value: backup/Dockerfile
  stages:
    - stage:
        name: Build
        identifier: Build
        type: CI
        spec:
          cloneCodebase: true
          # Cloud Run runs amd64, so build amd64 here rather than the arm64 a
          # developer laptop would produce.
          platform:
            os: Linux
            arch: Amd64
          runtime:
            # Harness-hosted build infrastructure; no delegate required.
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Unit Tests
                  identifier: unit_tests
                  spec:
                    # The Dockerfile builds with -DskipTests for speed, so tests
                    # run here instead and fail the pipeline if they break.
                    image: maven:3.9.9-eclipse-temurin-21
                    shell: Sh
                    command: |
                      ./mvnw -B test
              - step:
                  type: BuildAndPushGAR
                  name: Build and Push Image
                  identifier: build_push_gar
                  spec:
                    # GCP connector with push access to Artifact Registry.
                    connectorRef: <+input>
                    host: <+pipeline.variables.garHost>
                    projectID: <+pipeline.variables.gcpProject>
                    # Final ref: host/projectID/imageName == host/project/repo/image
                    imageName: <+pipeline.variables.garRepo>/<+pipeline.variables.imageName>
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: <+pipeline.variables.dockerfile>
                    context: .
    - stage:
        name: Deploy
        identifier: Deploy
        type: Deployment
        spec:
          deploymentType: GoogleCloudRun
          # References entities defined alongside this pipeline:
          #   service_banking_api.yaml, environment_dev.yaml,
          #   infrastructure_cloud_run_dev.yaml
          service:
            serviceRef: nexapay_banking_api
            # Deploy the tag the Build stage just pushed, by feeding
            # <+pipeline.sequenceId> as the artifact version.
            serviceInputs:
              serviceDefinition:
                type: GoogleCloudRun
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: banking_api_gar
                      sources:
                        - identifier: banking_api_gar
                          type: GoogleArtifactRegistry
                          spec:
                            version: <+pipeline.sequenceId>
          environment:
            environmentRef: dev
            deployToAll: false
            infrastructureDefinitions:
              - identifier: cloud_run_dev
          execution:
            steps:
              - step:
                  name: Download Manifest
                  identifier: download_manifest
                  type: DownloadManifest
                  timeout: 10m
                  spec: {}
              - step:
                  name: Prepare Rollback
                  identifier: prepare_rollback
                  type: GoogleCloudRunPrepareRollback
                  timeout: 10m
                  spec: {}
              - step:
                  name: Deploy to Cloud Run
                  identifier: cloud_run_deploy
                  # Runs `gcloud run services replace` with the resolved manifest.
                  type: GoogleCloudRunDeploy
                  timeout: 15m
                  spec: {}
              - step:
                  name: Shift 100% Traffic
                  identifier: traffic_shift
                  # Runs `gcloud run services update-traffic`.
                  type: GoogleCloudRunTrafficShift
                  timeout: 10m
                  spec:
                    revisionTrafficDetails:
                      - revisionName: latest
                        trafficValue: 100
            rollbackSteps:
              - step:
                  name: Rollback Cloud Run
                  identifier: cloud_run_rollback
                  type: GoogleCloudRunRollback
                  timeout: 10m
                  spec: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
