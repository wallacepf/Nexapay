# Cloud Run service manifest (Knative serving spec). Harness applies this with
# `gcloud run services replace` during the GoogleCloudRunDeploy step.
#
# <+artifact.image> is substituted with the image resolved from the service's
# GoogleArtifactRegistry artifact source at deploy time.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nexapay-banking-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: <+artifact.image>
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NEXAPAY_SEED_ENABLED
              value: "true"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
  traffic:
    - percent: 100
      latestRevision: true
