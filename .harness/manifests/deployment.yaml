apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Values.name}}-deployment
  labels:
    app: {{.Values.name}}
spec:
  replicas: {{int .Values.replicas}}
  selector:
    matchLabels:
      app: {{.Values.name}}
  template:
    metadata:
      labels:
        app: {{.Values.name}}
      annotations:
        # Bump a rollout whenever the ConfigMap changes. Harness suffixes the
        # ConfigMap name with a hash, so this reference changes when config does.
        checksum/config: {{.Values.name}}-config
    spec:
      {{- if .Values.dockerconfigjson}}
      imagePullSecrets:
        - name: {{.Values.name}}-dockercfg
      {{- end}}
      containers:
        - name: {{.Values.name}}
          image: {{.Values.image}}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{int .Values.service.targetPort}}
          envFrom:
            - configMapRef:
                name: {{.Values.name}}-config
          resources:
            requests:
              cpu: {{.Values.resources.requests.cpu}}
              memory: {{.Values.resources.requests.memory}}
            limits:
              memory: {{.Values.resources.limits.memory}}
          # Spring Boot serves a lightweight health endpoint at /api/health.
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
